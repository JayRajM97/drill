<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Question Screen - Drill</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface": "#1b1c1c",
                        "surface-container-highest": "#e4e2e2",
                        "secondary-fixed": "#e5e2e1",
                        "outline": "#6d7b6c",
                        "on-surface-variant": "#3d4a3d",
                        "secondary": "#5f5e5e",
                        "tertiary-fixed": "#e2e3e1",
                        "on-error": "#ffffff",
                        "secondary-container": "#e5e2e1",
                        "error-container": "#ffdad6",
                        "on-tertiary-fixed": "#1a1c1b",
                        "on-tertiary-container": "#363837",
                        "surface": "#fbf9f8",
                        "on-tertiary-fixed-variant": "#454746",
                        "on-primary-fixed": "#002108",
                        "on-secondary-fixed": "#1c1b1b",
                        "on-background": "#1b1c1c",
                        "background": "#fbf9f8",
                        "on-secondary-fixed-variant": "#474646",
                        "tertiary-container": "#a0a19f",
                        "surface-container-lowest": "#ffffff",
                        "on-error-container": "#93000a",
                        "inverse-primary": "#53e076",
                        "on-primary-container": "#004118",
                        "surface-container-high": "#e9e8e7",
                        "tertiary-fixed-dim": "#c6c7c5",
                        "surface-container-low": "#f5f3f3",
                        "surface-tint": "#006e2d",
                        "error": "#ba1a1a",
                        "primary-fixed-dim": "#53e076",
                        "inverse-surface": "#303031",
                        "outline-variant": "#bccbb9",
                        "primary-fixed": "#72fe8f",
                        "inverse-on-surface": "#f2f0f0",
                        "on-tertiary": "#ffffff",
                        "on-primary": "#ffffff",
                        "surface-dim": "#dbdad9",
                        "secondary-fixed-dim": "#c8c6c5",
                        "surface-container": "#efeded",
                        "surface-bright": "#fbf9f8",
                        "primary": "#006e2d",
                        "on-primary-fixed-variant": "#005320",
                        "surface-variant": "#e4e2e2",
                        "on-secondary": "#ffffff",
                        "primary-container": "#1db954",
                        "tertiary": "#5d5f5d",
                        "on-secondary-container": "#656464"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "container-max": "1120px",
                        "unit": "8px",
                        "margin-desktop": "64px",
                        "margin-mobile": "20px",
                        "gutter": "24px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Sora"],
                        "headline-lg-mobile": ["Sora"],
                        "body-lg": ["Inter"],
                        "display": ["Sora"],
                        "label-sm": ["Inter"],
                        "body-md": ["Inter"],
                        "label-md": ["Inter"],
                        "headline-md": ["Sora"]
                    },
                    "fontSize": {
                        "headline-lg": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "headline-lg-mobile": ["28px", { "lineHeight": "1.2", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "display": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "label-sm": ["12px", { "lineHeight": "1.2", "fontWeight": "500" }],
                        "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "label-md": ["14px", { "lineHeight": "1.2", "letterSpacing": "0.01em", "fontWeight": "600" }],
                        "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            font-feature-settings: 'liga';
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
        .fill-icon {
            font-variation-settings: 'FILL' 1;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface h-screen flex flex-col md:bg-surface-container-low font-body-md">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-surface border-b border-outline-variant flat no shadows h-16 flex justify-between items-center px-margin-mobile md:px-margin-desktop max-w-container-max mx-auto">
<div class="flex items-center gap-2 hover:bg-surface-container-low transition-colors rounded-lg p-2 cursor-pointer active:scale-95 duration-150">
<span class="material-symbols-outlined text-primary" data-icon="bolt">bolt</span>
</div>
<div class="font-display text-headline-md font-bold text-primary">
            Drill
        </div>
<div class="flex items-center gap-2 text-primary font-headline-md text-headline-md hover:bg-surface-container-low transition-colors rounded-lg p-2 cursor-pointer active:scale-95 duration-150">
<span>7 🔥</span>
</div>
</header>
<!-- Main Canvas -->
<main class="flex-1 flex flex-col items-center justify-center pt-24 pb-32 px-4 md:px-margin-desktop w-full max-w-[640px] mx-auto relative h-full">
<!-- Swipe Up Indicator -->
<div class="absolute top-24 left-1/2 -translate-x-1/2 flex flex-col items-center opacity-50 animate-bounce cursor-pointer">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="keyboard_arrow_up">keyboard_arrow_up</span>
<span class="font-label-sm text-label-sm text-on-surface-variant mt-1">Previous</span>
</div>
<!-- Flashcard Container -->
<div class="w-full bg-surface-container-lowest border border-outline-variant rounded-xl p-8 flex flex-col shadow-sm relative group hover:shadow-md transition-shadow duration-300 min-h-[400px]">
<!-- Tags -->
<div class="flex flex-wrap gap-2 mb-8">
<span class="px-3 py-1 bg-surface-container text-on-surface font-label-sm text-label-sm rounded-full uppercase tracking-wider">Mobility</span>
<span class="px-3 py-1 bg-surface-container text-on-surface font-label-sm text-label-sm rounded-full uppercase tracking-wider">Product Design</span>
<span class="px-3 py-1 bg-error-container text-on-error-container font-label-sm text-label-sm rounded-full uppercase tracking-wider font-bold">Hard</span>
</div>
<!-- Question -->
<div class="flex-1 flex items-center justify-center">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-center text-on-surface">
                    How would you improve the Swiggy user experience for senior citizens?
                </h1>
</div>
<!-- Timer (Optional 30s think) -->
<div class="mt-8 flex justify-center items-center gap-2 text-on-surface-variant font-body-md text-body-md">
<span class="material-symbols-outlined" data-icon="timer">timer</span>
<span>Think: 30s</span>
</div>
</div>
<!-- Swipe Down Indicator -->
<div class="absolute bottom-32 left-1/2 -translate-x-1/2 flex flex-col items-center opacity-50 animate-bounce cursor-pointer">
<span class="font-label-sm text-label-sm text-on-surface-variant mb-1">Next</span>
<span class="material-symbols-outlined text-on-surface-variant" data-icon="keyboard_arrow_down">keyboard_arrow_down</span>
</div>
</main>
<!-- Bottom Peek Cards (Absolute positioned within the safe area) -->
<div class="fixed bottom-24 w-full flex justify-center gap-4 px-4 z-40 max-w-container-max left-1/2 -translate-x-1/2 overflow-x-auto pb-4 hide-scrollbar">
<!-- Peek Card: Framework -->
<button class="flex-shrink-0 flex items-center gap-2 px-4 py-2 bg-surface-container-lowest border border-outline-variant rounded-full text-on-surface hover:bg-surface-container-low transition-colors shadow-sm active:scale-95 duration-150">
<span class="material-symbols-outlined text-primary" data-icon="account_tree">account_tree</span>
<span class="font-label-md text-label-md">Framework</span>
</button>
<!-- Peek Card: Clarifying Qs -->
<button class="flex-shrink-0 flex items-center gap-2 px-4 py-2 bg-surface-container-lowest border border-outline-variant rounded-full text-on-surface hover:bg-surface-container-low transition-colors shadow-sm active:scale-95 duration-150">
<span class="material-symbols-outlined text-primary" data-icon="help_outline">help_outline</span>
<span class="font-label-md text-label-md">Clarifying Qs</span>
</button>
<!-- Peek Card: Key Pointers -->
<button class="flex-shrink-0 flex items-center gap-2 px-4 py-2 bg-surface-container-lowest border border-outline-variant rounded-full text-on-surface hover:bg-surface-container-low transition-colors shadow-sm active:scale-95 duration-150">
<span class="material-symbols-outlined text-primary" data-icon="lightbulb">lightbulb</span>
<span class="font-label-md text-label-md">Key Pointers</span>
</button>
</div>
<!-- Main Action Button (Flip) -->
<div class="fixed bottom-0 left-0 w-full flex justify-center items-center h-24 bg-surface md:bg-transparent px-4 z-50 pointer-events-none">
<button class="pointer-events-auto w-full md:w-auto md:min-w-[240px] h-14 bg-primary-container text-on-primary rounded-xl font-headline-md text-headline-md flex items-center justify-center shadow-sm hover:shadow-md hover:-translate-y-0.5 active:scale-95 transition-all duration-200">
            Flip
        </button>
</div>
<style>
        /* Hide scrollbar for horizontal peek cards */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</body></html>
